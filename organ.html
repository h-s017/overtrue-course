<body>
<header class="header"><div class="brand"><a href="https://www.hanascent.com/" target="_blank" rel="noopener">氣味藝術序曲調香台<small>H.Fugue Atelier · by Hana</small></a></div><div class="top-actions"><span class="pill" id="countBadge">0 種原料</span><button class="btn gold" onclick="openNewMaterial()">＋ 新增原料</button></div></header>
<nav class="tabs"><button class="tab active" onclick="switchTab('library')">課程原料庫</button><button class="tab" onclick="switchTab('formula')">調香配方表</button></nav>
<section class="panel active" id="panel-library">
  <div class="toolbar-head"><div><div class="section-title">氣味藝術序曲｜課程原料庫</div><div class="section-sub">僅保留本課程使用香基、精油與單體；適合學生上課與配方練習。</div></div><button class="btn" onclick="toggleToolbar()">收合／展開搜尋</button></div>
  <div class="toolbar" id="toolbar"><div class="search"><input id="searchInput" placeholder="搜尋英文、中文、香調、CAS…" oninput="renderLibrary()"></div><select id="scentFilter" onchange="renderLibrary()" style="min-width:150px" aria-label="香調篩選"><option value="">全部香調</option></select><button class="chip active" data-note="" onclick="setNoteFilter(this)">全部</button><button class="chip" data-note="Top" onclick="setNoteFilter(this)">Top</button><button class="chip" data-note="Middle" onclick="setNoteFilter(this)">Middle</button><button class="chip" data-note="Base" onclick="setNoteFilter(this)">Base</button><button class="chip" data-kind="單體" onclick="setKindFilter(this)">單體</button><button class="chip" data-kind="精油" onclick="setKindFilter(this)">精油</button><button class="chip" data-kind="香基" onclick="setKindFilter(this)">香基</button><button class="chip" onclick="sortMaterials()">英文 A–Z</button></div>
  <div class="grid" id="materialGrid"></div>
</section>
<section class="panel" id="panel-formula">
  <div class="toolbar-head"><div><div class="section-title">調香配方表</div><div class="section-sub">可建立多支香水配方；每支配方會各自保存作品名稱、設計敘述與原料列。</div></div><button class="btn" onclick="addFormulaRow()">＋ 新增一列</button></div>
  <div class="formula-manager">
    <div class="formula-manager-left"><label for="formulaSelector">目前配方</label><select id="formulaSelector" onchange="selectFormula(this.value)"></select><span class="formula-count" id="formulaCount">0 支配方</span></div>
    <div class="formula-manager-left"><button class="btn gold" onclick="newFormula()">＋ 新增香水配方</button><button class="btn" onclick="duplicateFormula()">複製目前配方</button><button class="btn danger" onclick="deleteCurrentFormula()">刪除目前配方</button></div>
  </div>
  <div class="recipe-card">
    <div class="recipe-top">
      <div class="fg"><label>學生姓名</label><input id="studentName" placeholder="姓名"></div>
      <div class="fg"><label>課程場次</label><input id="classSession" placeholder="例如 2026/05/xx"></div>
      <div class="fg"><label>作品名稱</label><input id="workName" placeholder="香水名稱"></div>
      <div class="fg"><label>香水容量（g）</label><input id="perfumeCapacity" type="number" step="0.01" value="10" oninput="recalc()"></div>
      <div class="fg"><label>香水濃度百分比</label><input id="perfumeConcentration" type="text" value="20%" oninput="recalc()" placeholder="20%"></div>
      <div class="fg"><label>調製日期</label><input id="formulaDate" type="date"></div>
      <div class="fg"><label>天氣</label><input id="weather" placeholder="晴 / 陰 / 雨…"></div>
      <div class="fg"><label>室溫（°C）</label><input id="temperature" type="number" step="0.1" placeholder="25"></div>
      <div class="fg"><label>備註</label><input id="quickNote" placeholder="例如：第一次試作"></div>
      <div class="fg full"><label>香水設計敘述</label><textarea id="designNote" placeholder="描述這款香水的設計概念、情感氛圍、靈感來源、目標香調方向…"></textarea></div>
    </div>
    <div class="warn" id="mixWarn">提醒：同一張配方表同時使用 g 與滴數時，系統會分別依 g 與滴數組計算比例；建議同一份配方使用同一種記錄單位。</div>
    <div class="table-wrap"><table><thead><tr><th>#</th><th class="name-col">原料</th><th>原料濃度</th><th>用量</th><th>單位</th><th>佔比 %</th><th>需要的原料 g</th><th class="reason-col">選用原因</th><th></th></tr></thead><tbody id="formulaRows"></tbody></table></div>
    <div class="totals"><div class="total-box"><div class="total-label">香料總克數</div><div class="total-val" id="totalG">0 g</div></div><div class="total-box"><div class="total-label">香料總滴數</div><div class="total-val" id="totalDrops">0 滴</div></div><div class="total-box"><div class="total-label">濃度×滴數加權總和</div><div class="total-val" id="totalDropWeight">0</div></div><div class="total-box"><div class="total-label">香水容量</div><div class="total-val" id="totalCapacity">0 g</div></div><div class="total-box"><div class="total-label">目標香料總量</div><div class="total-val" id="totalFragranceG">0 g</div></div></div>
    <div><button class="btn" onclick="saveFormula()">儲存在本機</button> <button class="btn" onclick="downloadFormula()">下載 JSON</button> <button class="btn dark" onclick="submitFormula()">送出給 Hana 老師</button><span class="submit-msg" id="submitMsg"></span></div>
  </div>
</section>

function cleanLabel(s){return String(s??'').replace(new RegExp('k'+'p'+'i'+'a\\s*香基','gi'),'香基').replace(new RegExp('k'+'p'+'i'+'a','gi'),'香基');}
function normalizeItem(x){x.en=cleanLabel(x.en);x.cn=cleanLabel(x.cn);x.type=(x.type||[]).map(cleanLabel);x.alias=(x.alias||[]).map(cleanLabel);x.ifra=cleanLabel(x.ifra);x.personal=cleanLabel(x.personal);if(!['單體','精油','香基'].includes(x.kind)){x.kind=(x.type||[]).includes('香基')?'香基':((x.type||[]).includes('精油')?'精油':'單體');}if(x.kind==='香基'&&!x.type.includes('香基'))x.type.unshift('香基');if(x.kind==='精油'&&!x.type.includes('精油'))x.type.unshift('精油');if(x.kind==='單體')x.type=x.type.filter(t=>t!=='香基'&&t!=='精油');x.advisors=x.advisors||[];return x;}
function itemKey(x){return (x.en||'').toLowerCase()+'|'+(x.cn||'');}
function loadDb(){
  let saved=null;
  try{saved=JSON.parse(localStorage.getItem(DB_KEY)||'null');}catch(e){saved=null;}
  const defaults=DEFAULT_DB.map(x=>normalizeItem({...x, note:[...(x.note||[])], type:[...(x.type||[])], alias:[...(x.alias||[])], advisors:(x.advisors||[]).map(a=>({...a}))}));
  const defaultMap=new Map(defaults.map(x=>[itemKey(x),x]));
  const incoming=(Array.isArray(saved)&&saved.length?saved:defaults).map(normalizeItem);
  db=incoming.map(x=>{
    const d=defaultMap.get(itemKey(x));
    if(d){
      if((!x.personal||!String(x.personal).trim()) && d.personal) x.personal=d.personal;
      if((!x.advisors||!x.advisors.length) && d.advisors && d.advisors.length) x.advisors=d.advisors.map(a=>({...a,name:(a.name||'Re.').replace('韋老師','Re.')}));
    }
    x.advisors=(x.advisors||[]).map(a=>({...a,name:(a.name||'Re.').replace('韋老師','Re.')}));
    return x;
  });
  const keys=new Set(db.map(itemKey));
  defaults.forEach(d=>{if(!keys.has(itemKey(d))){db.push(d);keys.add(itemKey(d));}});
  saveDb();
}
function saveDb(){localStorage.setItem(DB_KEY,JSON.stringify(db));}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function materialLabel(m){return `${m.en||''}${m.cn?'｜'+m.cn:''}${m.kind&&m.kind!=='單體'?'（'+m.kind+'）':''}`;}

function populateScentFilter(){
  const sel=document.getElementById('scentFilter');
  if(!sel)return;

  const scents=[...new Set(db.flatMap(m=>(m.type||[])).map(cleanLabel).filter(t=>t&&t!=='單體'&&t!=='香基'&&t!=='精油'))].sort((a,b)=>a.localeCompare(b,'en',{sensitivity:'base'}));

  if(current && !scents.includes(current)) sel.value='';
}

function saveActiveFormulaFromDom(){

}
function persistFormulas(){localStorage.setItem(FORMULA_KEY,JSON.stringify({activeFormulaId,formulas}));}
function loadFormula(){
  try{
    const saved=JSON.parse(localStorage.getItem(FORMULA_KEY)||'null');
    if(saved&&Array.isArray(saved.formulas)&&saved.formulas.length){formulas=saved.formulas;activeFormulaId=saved.activeFormulaId||formulas[0].id;}
  }catch(e){}
  if(!formulas.length){
    try{
      const legacy=JSON.parse(localStorage.getItem(LEGACY_FORMULA_KEY)||'null');
      if(legacy){
        const f=emptyFormulaData(legacy.workName||'舊版配方');
        Object.assign(f,legacy,{id:uid(),rows:(legacy.rows&&legacy.rows.length)?legacy.rows:Array.from({length:8},emptyFormulaRow)});
        formulas=[f];activeFormulaId=f.id;
      }
    }catch(e){}
  }
  if(!formulas.length){const f=emptyFormulaData('香水配方 1');formulas=[f];activeFormulaId=f.id;}
  const f=currentFormula();activeFormulaId=f.id;rows=(f.rows&&f.rows.length?f.rows:Array.from({length:8},emptyFormulaRow)).map(r=>({...emptyFormulaRow(),...r}));applyMetaToDom(f);persistFormulas();
}

  const f=currentFormula(); if(!f)return;
  activeFormulaId=f.id; rows=(f.rows&&f.rows.length?f.rows:Array.from({length:8},emptyFormulaRow)).map(r=>({...emptyFormulaRow(),...r}));
  applyMetaToDom(f);renderFormulaList();renderFormula();
}
function newFormula(){
  saveActiveFormulaFromDom();
  const f=emptyFormulaData(`香水配方 ${formulas.length+1}`);
  const shared=collectMetaFromDom();
  f.studentName=shared.studentName||'';f.classSession=shared.classSession||'';f.weather=shared.weather||'';f.temperature=shared.temperature||'';
  formulas.push(f);activeFormulaId=f.id;rows=f.rows.map(r=>({...r}));applyMetaToDom(f);persistFormulas();renderFormulaList();renderFormula();flash('已新增一支香水配方');
}
function duplicateFormula(){
  saveActiveFormulaFromDom();const base=currentFormula();if(!base)return;
  const copy=JSON.parse(JSON.stringify(base));copy.id=uid();copy.workName=(base.workName||'未命名配方')+' copy';
  formulas.push(copy);activeFormulaId=copy.id;rows=copy.rows.map(r=>({...r}));applyMetaToDom(copy);persistFormulas();renderFormulaList();renderFormula();flash('已複製目前配方');
}
function deleteCurrentFormula(){
  if(formulas.length<=1){flash('至少需要保留一支配方');return;}
  const f=currentFormula(); if(!f)return;
  if(!confirm(`確定刪除「${f.workName||'未命名配方'}」？`))return;
  formulas=formulas.filter(x=>String(x.id)!==String(f.id));activeFormulaId=formulas[0].id;rows=formulas[0].rows.map(r=>({...emptyFormulaRow(),...r}));applyMetaToDom(formulas[0]);persistFormulas();renderFormulaList();renderFormula();flash('已刪除配方');
}
function materialOptions(selected){return '<option value="">選擇原料…</option>'+sortedMaterials().map(m=>`<option value="${m.id}" ${String(selected)===String(m.id)?'selected':''}>${esc(materialLabel(m))}</option>`).join('');}
function emptyFormulaRow(){return {materialId:'',concentration:'10%',amount:'',unit:'g',reason:''};}
function isFormulaRowEmpty(r){return !String(r.materialId||'').trim()&&!String(r.amount||'').trim()&&!String(r.reason||'').trim();}
function addFormulaRow(mid=null,rerender=true){
  if(mid){
    const emptyIndex=rows.findIndex(isFormulaRowEmpty);
    const next={materialId:mid,concentration:'10%',amount:'',unit:'g',reason:''};
    if(emptyIndex>=0){rows[emptyIndex]=next;}else{rows.push(next);}
  }else{
    rows.push(emptyFormulaRow());
  }
  const f=currentFormula(); if(f)f.rows=rows.map(r=>({...r}));persistFormulas();
  if(rerender)renderFormula();
}
function removeRow(i){rows.splice(i,1);const f=currentFormula();if(f)f.rows=rows.map(r=>({...r}));persistFormulas();renderFormula();}
function parseConcentration(v){let s=String(v??'').trim();if(!s)return 100;s=s.replace('%','').trim();let n=parseFloat(s);if(!isFinite(n))return 100;if(n>0&&n<=1)n=n*100;return Math.max(0,n);}
function num(v){const n=parseFloat(String(v??'').replace(',','.'));return isFinite(n)?n:0;}
function rowWeight(r){return parseConcentration(r.concentration)*num(r.amount);}
function collectRowsFromDom(updateActive=true){const trs=[...document.querySelectorAll('#formulaRows tr')];if(!trs.length)return;rows=trs.map(tr=>({materialId:tr.querySelector('.r-material').value,concentration:tr.querySelector('.r-conc').value,amount:tr.querySelector('.r-amount').value,unit:tr.querySelector('.r-unit').value,reason:tr.querySelector('.r-reason').value}));if(updateActive){const f=currentFormula();if(f)f.rows=rows.map(r=>({...r}));}}
function recalc(){collectRowsFromDom();const totalG=rows.filter(r=>r.unit==='g').reduce((s,r)=>s+num(r.amount),0);const totalDrops=rows.filter(r=>r.unit==='滴').reduce((s,r)=>s+num(r.amount),0);const dropWeight=rows.filter(r=>r.unit==='滴').reduce((s,r)=>s+rowWeight(r),0);const cap=num(document.getElementById('perfumeCapacity').value);const fragrancePct=parseConcentration(document.getElementById('perfumeConcentration')?.value||'20%');const targetFragranceG=cap*fragrancePct/100;const mixed=totalG>0&&totalDrops>0;document.getElementById('mixWarn').classList.toggle('show',mixed);document.getElementById('totalG').textContent=totalG.toFixed(3).replace(/\.0+$/,'')+' g';document.getElementById('totalDrops').textContent=totalDrops.toFixed(1).replace(/\.0$/,'')+' 滴';document.getElementById('totalDropWeight').textContent=dropWeight.toFixed(2).replace(/\.00$/,'');document.getElementById('totalCapacity').textContent=cap.toFixed(2).replace(/\.00$/,'')+' g';if(document.getElementById('totalFragranceG'))document.getElementById('totalFragranceG').textContent=targetFragranceG.toFixed(3).replace(/\.0+$/,'')+' g';[...document.querySelectorAll('#formulaRows tr')].forEach((tr,i)=>{const r=rows[i];let pct=0;if(r.unit==='g')pct=totalG?num(r.amount)/totalG*100:0;else pct=dropWeight?rowWeight(r)/dropWeight*100:0;const targetG=pct&&targetFragranceG?targetFragranceG*pct/100:0;tr.querySelector('.r-percent').textContent=pct?pct.toFixed(2)+'%':'—';tr.querySelector('.r-target').textContent=targetG?targetG.toFixed(3)+' g':'—';r.rowPercent=pct?pct.toFixed(2)+'%':'';r.rowPercentNumber=pct;r.targetIngredientG=+targetG.toFixed(3);});storeFormulaState();}
function renderFormula(){const tbody=document.getElementById('formulaRows');if(!tbody)return;renderFormulaList();tbody.innerHTML=rows.map((r,i)=>`<tr><td>${i+1}</td><td><select class="r-material" onchange="recalc()">${materialOptions(r.materialId)}</select></td><td><input class="r-conc narrow" value="${esc(r.concentration||'10%')}" oninput="recalc()" placeholder="10%"></td><td><input class="r-amount narrow" type="number" step="0.001" value="${esc(r.amount)}" oninput="recalc()" placeholder="0"></td><td><select class="r-unit" onchange="recalc()"><option ${r.unit==='g'?'selected':''}>g</option><option ${r.unit==='滴'?'selected':''}>滴</option></select></td><td class="calc r-percent">—</td><td class="calc r-target">—</td><td><input class="r-reason" value="${esc(r.reason)}" oninput="recalc()" placeholder="選用此原料的原因…"></td><td><button class="mini" onclick="removeRow(${i})">×</button></td></tr>`).join('');recalc();}
function buildPayload(){const materialMap=Object.fromEntries(db.map(m=>[String(m.id),m]));const meta=collectMetaFromDom();const cap=num(meta.perfumeCapacity);const fragrancePct=parseConcentration(meta.perfumeConcentration||'20%');return {formulaId:activeFormulaId,studentName:meta.studentName,classSession:meta.classSession,workName:meta.workName,formulaDate:meta.formulaDate,weather:meta.weather,temperature:meta.temperature,quickNote:meta.quickNote,note:meta.designNote,perfumeCapacity:cap,perfumeConcentration:meta.perfumeConcentration||'',perfumeConcentrationPercent:fragrancePct,totals:{materialTotalG:num(totalG.textContent),materialTotalDrops:num(totalDrops.textContent),dropWeightTotal:num(totalDropWeight.textContent),perfumeCapacityG:cap,targetFragranceG:num(totalFragranceG?.textContent)},formula:rows.map((r,i)=>{const m=materialMap[String(r.materialId)]||{};return {index:i+1,materialId:r.materialId,materialEn:m.en||'',materialCn:m.cn||'',kind:m.kind||'',types:m.type||[],concentration:r.concentration,concentrationPercent:parseConcentration(r.concentration),amount:num(r.amount),unit:r.unit,rowPercent:r.rowPercent,rowPercentNumber:r.rowPercentNumber,targetIngredientG:r.targetIngredientG,reason:r.reason};})};}
function buildAllPayload(){saveActiveFormulaFromDom();return {activeFormulaId,formulaCount:formulas.length,formulas:formulas.map(f=>{const oldId=activeFormulaId;const oldRows=rows;activeFormulaId=f.id;rows=(f.rows||[]).map(r=>({...emptyFormulaRow(),...r}));const payload={...f,rows:undefined,payload:buildPayload()};activeFormulaId=oldId;rows=oldRows;return payload;})};}
function storeFormulaState(){if(!document.getElementById('studentName'))return;const f=currentFormula();if(f){Object.assign(f,collectMetaFromDom(),{rows:rows.map(r=>({...r}))});}persistFormulas();}
function formulaPayload(){collectRowsFromDom();recalc();return buildPayload();}
function saveFormula(show=true){collectRowsFromDom();recalc();storeFormulaState();if(show)flash('已儲存目前配方');}
function flash(msg){const el=document.getElementById('submitMsg');el.textContent=msg;setTimeout(()=>{if(el.textContent===msg)el.textContent='';},2500);}
function downloadFormula(){const data=JSON.stringify(buildAllPayload(),null,2);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));a.download='hfugue-formulas.json';a.click();URL.revokeObjectURL(a.href);}
async function submitFormula(){const endpoint=(window.HFUGUE_CONFIG&&window.HFUGUE_CONFIG.SUBMIT_ENDPOINT)||SUBMIT_FALLBACK;if(!endpoint){flash('尚未設定送出網址');return;}try{flash('送出中…');const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(buildAllPayload())});const txt=await res.text();flash('已送出所有配方給 Hana 老師');}catch(err){console.error(err);flash('送出失敗，請改下載 JSON 備份');}}
function init(){loadDb();renderLibrary();loadFormula();renderFormulaList();renderFormula();}
init();
</script>

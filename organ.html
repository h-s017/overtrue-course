<body>
<header class="header"><div class="brand"><a href="https://www.hanascent.com/" target="_blank" rel="noopener">調香台 Organ<small>H.Fugue Atelier · by Hana</small></a></div><div class="top-actions"><span class="pill" id="countBadge">0 種原料</span><button class="btn gold" onclick="openNewMaterial()">＋ 新增原料</button></div></header>
<nav class="tabs"><button class="tab active" onclick="switchTab('library')">單體／香基庫</button><button class="tab" onclick="switchTab('formula')">調香配方表</button></nav>
<section class="panel active" id="panel-library">
  <div class="toolbar-head"><div><div class="section-title">單體／香基庫</div><div class="section-sub">單體原料與 80 種香基合併管理；香基字樣已統一。</div></div><button class="btn" onclick="toggleToolbar()">收合／展開搜尋</button></div>
  <div class="toolbar" id="toolbar"><div class="search"><input id="searchInput" placeholder="搜尋英文、中文、香調、CAS…" oninput="renderLibrary()"></div><select id="scentFilter" onchange="renderLibrary()" style="min-width:150px" aria-label="香調篩選"><option value="">全部香調</option></select><button class="chip active" data-note="" onclick="setNoteFilter(this)">全部</button><button class="chip" data-note="Top" onclick="setNoteFilter(this)">Top</button><button class="chip" data-note="Middle" onclick="setNoteFilter(this)">Middle</button><button class="chip" data-note="Base" onclick="setNoteFilter(this)">Base</button><button class="chip" data-kind="單體" onclick="setKindFilter(this)">單體</button><button class="chip" data-kind="精油" onclick="setKindFilter(this)">精油</button><button class="chip" data-kind="香基" onclick="setKindFilter(this)">香基</button><button class="chip" onclick="sortMaterials()">英文 A–Z</button></div>
  <div class="grid" id="materialGrid"></div>
</section>
<section class="panel" id="panel-formula">
  <div class="toolbar-head"><div><div class="section-title">調香配方表</div><div class="section-sub">可用 g 或滴數記錄；滴數佔比使用「原料濃度百分比 × 滴數」加權計算。</div></div><button class="btn" onclick="addFormulaRow()">＋ 新增一列</button></div>
  <div class="recipe-card">
    <div class="recipe-top">
      <div class="fg"><label>學生姓名</label><input id="studentName" placeholder="姓名"></div>
      <div class="fg"><label>課程場次</label><input id="classSession" placeholder="例如 2026/05/xx"></div>
      <div class="fg"><label>作品名稱</label><input id="workName" placeholder="香水名稱"></div>
      <div class="fg"><label>香水容量（g）</label><input id="perfumeCapacity" type="number" step="0.01" value="10" oninput="recalc()"></div>
      <div class="fg"><label>香水濃度百分比</label><input id="perfumeConcentration" type="text" value="20%" oninput="recalc()" placeholder="20%"></div>
      <div class="fg"><label>調製日期</label><input id="formulaDate" type="date"></div>
      <div class="fg"><label>天氣</label><input id="weather" placeholder="晴 / 陰 / 雨…"></div>
      <div class="fg"><label>室溫（°C）</label><input id="temperature" type="number" step="0.1" placeholder="25"></div>
      <div class="fg"><label>備註</label><input id="quickNote" placeholder="例如：第一次試作"></div>
      <div class="fg full"><label>香水設計敘述</label><textarea id="designNote" placeholder="描述這款香水的設計概念、情感氛圍、靈感來源、目標香調方向…"></textarea></div>
    </div>
    <div class="warn" id="mixWarn">提醒：同一張配方表同時使用 g 與滴數時，系統會分別依 g 與滴數組計算比例；建議同一份配方使用同一種記錄單位。</div>
    <div class="table-wrap"><table><thead><tr><th>#</th><th class="name-col">原料</th><th>原料濃度</th><th>用量</th><th>單位</th><th>佔比 %</th><th>需要的原料 g</th><th class="reason-col">選用原因</th><th></th></tr></thead><tbody id="formulaRows"></tbody></table></div>
    <div class="totals"><div class="total-box"><div class="total-label">香料總克數</div><div class="total-val" id="totalG">0 g</div></div><div class="total-box"><div class="total-label">香料總滴數</div><div class="total-val" id="totalDrops">0 滴</div></div><div class="total-box"><div class="total-label">濃度×滴數加權總和</div><div class="total-val" id="totalDropWeight">0</div></div><div class="total-box"><div class="total-label">香水容量</div><div class="total-val" id="totalCapacity">0 g</div></div><div class="total-box"><div class="total-label">目標香料總量</div><div class="total-val" id="totalFragranceG">0 g</div></div></div>
    <div><button class="btn" onclick="saveFormula()">儲存在本機</button> <button class="btn" onclick="downloadFormula()">下載 JSON</button> <button class="btn dark" onclick="submitFormula()">送出給 Hana 老師</button><span class="submit-msg" id="submitMsg"></span></div>
  </div>
</section>
<div class="drawer-bg" id="drawerBg" onclick="drawerBackdrop(event)"><aside class="drawer"><div class="drawer-top"><div><div class="drawer-title" id="drawerTitle">—</div><div class="drawer-sub" id="drawerSub">—</div></div><button class="btn" onclick="closeDrawer()">關閉</button></div><div id="drawerContent"></div></aside></div>

const SUBMIT_FALLBACK='https://script.google.com/macros/s/AKfycbyue9QbgwV5xQQljLo6LiSzfP_rXsHL2mia72_WACBN89LA1X1sTDrYTG1WpAcQ5mooCg/exec';
const SEED=[
{id:1,en:"Methyl Benzoate",cn:"苯甲酸甲酯",note:["Top"],type:["Floral"],alias:[],cas:"93-58-3",inci:"METHYL BENZOATE",ifra:"IFRA 第51版：無限制（Cat.4）。EU：最高0.5%，防腐劑管制V/1a。",personal:"① 剛聞到的刺鼻味，直接延伸到鼻腔深處。\n② 類似成熟的香蕉感，濃度高時會有厭氧感。\n③ 香蕉味和花香，持香度中等。",advisors:[]},
{id:2,en:"Ebanol",cn:"檀香木質調",note:["Base"],type:["Woody"],alias:["Matsunol","Muscosandrol"],cas:"67801-20-1",inci:"SANDAL PENTENOL",ifra:"IFRA 第51版：Cat.4無特定限制。建議0.5–5%。Givaudan研發。",personal:"① 回甘、甜味的中藥材、八角味，圓潤感，使心情愉快。\n② 木質香料感，鼻腔中段。\n③ 檀木香氣非常持香。",advisors:[]},
{id:3,en:"Para-Cresyl Acetate",cn:"對甲酚乙酸酯",note:["Middle"],type:["Floral"],alias:["p-Cresyl Acetate","Narceol"],cas:"140-39-6",inci:"P-CRESYL ACETATE",ifra:"IFRA 第51版：Cat.4最高1.25%。建議以10%稀釋液操作。",personal:"① 臭臭的、類似乾大便的味道，鼻腔前段。\n② 動物騷味、百花、草皮感。\n③ 持香度低。",advisors:[]},
{id:4,en:"Eugenol",cn:"丁香酚",note:["Middle"],type:["Spicy","Woody"],alias:["4-Allylguaiacol"],cas:"97-53-0",inci:"EUGENOL",ifra:"IFRA 第51版：Cat.4最高2.5%。EU 26種致敏原：leave-on≥0.01%須標示。",personal:"① 香料感、牙醫感，鼻腔前段。\n② 明顯涼感。\n③ 持香度中等。",advisors:[]},
{id:5,en:"Indolene / Indole",cn:"吲哚",note:["Base"],type:["Floral","Animal"],alias:["1H-Benzo[b]pyrrole"],cas:"120-72-9",inci:"INDOLE",ifra:"IFRA 第51版：有限制，成品通常<0.1%。注意變色風險。",personal:"① 刺鼻。\n② 動物感、金屬感、水感，鼻腔中段。\n③ 白花香、乾淨、臭感。",advisors:[]},
{id:6,en:"Geranyl Acetate",cn:"乙酸香葉酯",note:["Middle"],type:["Floral"],alias:["Geranyl Ethanoate"],cas:"105-87-3",inci:"GERANYL ACETATE",ifra:"IFRA 第51版：無限制。FEMA No.2509（GRAS）。",personal:"① 酵素、花香、酒香，鼻腔後段，感覺明亮。\n② 花香、空氣感。",advisors:[]},
{id:7,en:"Hexyl Salicylate",cn:"水楊酸己酯",note:["Middle"],type:["Floral","Herbal"],alias:["Hexyl 2-hydroxybenzoate"],cas:"6259-76-3",inci:"HEXYL SALICYLATE",ifra:"IFRA 第51版：有限制（STD 042）。EU CLP：CMR Cat.2及致敏Cat.1。兒童<3歲最高0.1%。",personal:"① 酸、亮，鼻腔前段。\n② 綠葉、細微動物感（類瓦斯感）。",advisors:[]},
{id:8,en:"Tetrahydro Mugual",cn:"鈴蘭醇",note:["Middle"],type:["Floral","Citrus"],alias:[],cas:"41723-66-4",inci:"TETRAHYDROMUGUOL",ifra:"IFRA 第51版：查無特定限制。建議向供應商取得合規聲明。",personal:"① 花香、暖感、柑橘味、果肉多汁。\n② 果肉多汁感。",advisors:[]},
{id:9,en:"Benzyl Acetate",cn:"乙酸苯甲酯",note:["Top"],type:["Floral","Fruity"],alias:[],cas:"140-11-4",inci:"BENZYL ACETATE",ifra:"IFRA 第51版：純品無限制。EU 26種致敏原：leave-on≥0.01%須標示。FEMA 2135。",personal:"① 香蕉、百花、茉莉。\n② 微量動物感、甜，鼻腔中段。",advisors:[]},
{id:10,en:"Hedione",cn:"二氫茉莉酮酸甲酯",note:["Middle"],type:["Floral"],alias:["Methyl Dihydrojasmonate","MDJ"],cas:"24851-98-7",inci:"METHYL DIHYDROJASMONATE",ifra:"IFRA 第51版：無限制。FEMA 3408。典型用量2–15%（最高可達35%）。",personal:"① 透明感、清透水感。\n② 百花香，鼻腔中段。",advisors:[]},
{id:11,en:"Ambrox Super",cn:"龍涎香",note:["Base"],type:["Woody","Animal","Amber"],alias:["Ambroxan","Ambroxide"],cas:"6790-58-5",inci:"AMBROXIDE",ifra:"IFRA 第51版：無限制（Cat.4）。FEMA 3471。典型用量0.1–5%。",personal:"① 辛辣感（較Hedione明顯），鼻腔中段。\n② 木質調。",advisors:[]},
{id:12,en:"Calone 1951",cn:"西瓜酮",note:["Base"],type:["Marine","Fruity"],alias:["Oceanone"],cas:"28940-11-6",inci:"CALONE",ifra:"IFRA 第51版：無禁止規定。極強效，成品通常0.01–0.1%。",personal:"① 明亮、甜水果、水感，鼻腔中段。\n② 西瓜、清涼、海風感。",advisors:[]},
{id:13,en:"Helional",cn:"新洋茉莉醛",note:["Middle"],type:["Marine","Floral"],alias:[],cas:"1205-17-0",inci:"HELIONAL",ifra:"IFRA 第51版：查無特定限制。建議用量0.1–2%。",personal:"① 亮、水感、洗淨感，鼻腔後段。\n② 花香、明亮感，如向日葵下的氣味。",advisors:[]},
{id:14,en:"Ethyl Linalool",cn:"乙基芳樟醇",note:["Top","Middle"],type:["Floral"],alias:[],cas:"10339-55-6",inci:"ETHYL LINALOOL",ifra:"IFRA 第51版：本身無特定限制。注意：配方含Linalool為EU 26種致敏原。",personal:"① 強醇感（溶劑感）、花香、柑橘感，鼻腔前至中段。\n② 微量動物感、百花、微利（銳利邊緣）、枝幹感。",advisors:[]},

{id:16,en:"Iso E Super",cn:"龍涎酮",note:["Base"],type:["Woody"],alias:["OTNE"],cas:"54464-57-2",inci:"TETRAMETHYL ACETYLOCTAHYDRONAPHTHALENES",ifra:"IFRA 第51版：Cat.4最高21.4%。IFF研發（1973），95%的香水配方使用。",personal:"① 空間感、礦物感、氣透力、透明感，鼻腔後段。\n② 木質、琥珀、細緻感。",advisors:[]},
{id:17,en:"Galaxolide",cn:"佳樂麝香",note:["Base"],type:["Musky"],alias:["HHCB"],cas:"1222-05-5",inci:"HEXAMETHYLINDANOPYRAN",ifra:"IFRA 第51版：Cat.4最高1.5%。水生毒性Aquatic Chronic 2；EPA列高優先TSCA物質。",personal:"① 乾淨的白麝香、甜感。\n② 蓬鬆感、粉質，鼻腔前段。",advisors:[]},

const DEFAULT_DB=[...SEED,...BASES_80].map(x=>({...x, kind:(x.type||[]).includes('香基')?'香基':((x.type||[]).includes('精油')?'精油':'單體'), advisors:x.advisors||[]}));
const DB_KEY='hfugue-organ-stable-db-v1';
const FORMULA_KEY='hfugue-organ-formula-v1';
let db=[]; let activeNote=''; let activeKind=''; let currentId=null;
function cleanLabel(s){return String(s??'').replace(new RegExp('k'+'p'+'i'+'a\\s*香基','gi'),'香基').replace(new RegExp('k'+'p'+'i'+'a','gi'),'香基');}
function normalizeItem(x){x.en=cleanLabel(x.en);x.cn=cleanLabel(x.cn);x.type=(x.type||[]).map(cleanLabel);x.alias=(x.alias||[]).map(cleanLabel);x.ifra=cleanLabel(x.ifra);x.personal=cleanLabel(x.personal);if(!['單體','精油','香基'].includes(x.kind)){x.kind=(x.type||[]).includes('香基')?'香基':((x.type||[]).includes('精油')?'精油':'單體');}if(x.kind==='香基'&&!x.type.includes('香基'))x.type.unshift('香基');if(x.kind==='精油'&&!x.type.includes('精油'))x.type.unshift('精油');if(x.kind==='單體')x.type=x.type.filter(t=>t!=='香基'&&t!=='精油');x.advisors=x.advisors||[];return x;}
function loadDb(){try{db=JSON.parse(localStorage.getItem(DB_KEY)||'null')||DEFAULT_DB;}catch(e){db=DEFAULT_DB;} db=db.map(normalizeItem); const keys=new Set(); db=[...db,...DEFAULT_DB].map(normalizeItem).filter(x=>{const k=(x.en||'').toLowerCase()+'|'+(x.cn||''); if(keys.has(k))return false; keys.add(k); return true;}); saveDb();}
function saveDb(){localStorage.setItem(DB_KEY,JSON.stringify(db));}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function materialLabel(m){return `${m.en||''}${m.cn?'｜'+m.cn:''}${m.kind&&m.kind!=='單體'?'（'+m.kind+'）':''}`;}
function sortedMaterials(){return [...db].sort((a,b)=>(a.en||'').localeCompare(b.en||'', 'en', {sensitivity:'base'}));}
function populateScentFilter(){
  const sel=document.getElementById('scentFilter');
  if(!sel)return;
  const current=sel.value||'';
  const scents=[...new Set(db.flatMap(m=>(m.type||[])).map(cleanLabel).filter(t=>t&&t!=='單體'&&t!=='香基'&&t!=='精油'))].sort((a,b)=>a.localeCompare(b,'en',{sensitivity:'base'}));
  sel.innerHTML='<option value="">全部香調</option>'+scents.map(s=>`<option value="${esc(s)}" ${s===current?'selected':''}>${esc(s)}</option>`).join('');
  if(current && !scents.includes(current)) sel.value='';
}
function switchTab(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('panel-'+id).classList.add('active');event?.target?.classList.add('active'); if(id==='formula')renderFormula();}
function toggleToolbar(){document.getElementById('toolbar').classList.toggle('collapsed');}
function setNoteFilter(btn){document.querySelectorAll('[data-note]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeNote=btn.dataset.note||'';renderLibrary();}
function setKindFilter(btn){const was=btn.classList.contains('active');document.querySelectorAll('[data-kind]').forEach(b=>b.classList.remove('active'));activeKind=was?'':btn.dataset.kind; if(!was)btn.classList.add('active');renderLibrary();}
function sortMaterials(){renderLibrary();}
function renderLibrary(){populateScentFilter();const q=(document.getElementById('searchInput')?.value||'').trim().toLowerCase();const sf=document.getElementById('scentFilter')?.value||'';let arr=sortedMaterials().filter(m=>{const types=(m.type||[]).map(cleanLabel);const hay=[m.en,m.cn,m.cas,m.inci,types.join(' '),(m.note||[]).join(' '),(m.alias||[]).join(' ')].join(' ').toLowerCase();return (!q||hay.includes(q))&&(!activeNote||(m.note||[]).includes(activeNote))&&(!activeKind||m.kind===activeKind)&&(!sf||types.includes(sf));});document.getElementById('countBadge').textContent=`${db.length} 種原料`;document.getElementById('materialGrid').innerHTML=arr.map(m=>`<div class="card"><div class="type">${esc(m.kind)}</div><div class="en">${esc(m.en)}</div><div class="cn">${esc(m.cn)}</div><div class="meta">${(m.note||[]).map(n=>`<span class="tag note">${esc(n)}</span>`).join('')}${(m.type||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><div class="card-actions"><button class="mini" onclick="openDrawer(${m.id})">查看／編輯</button><button class="mini" onclick="addFormulaRow(${m.id});switchTabDirect('formula')">加入配方</button></div></div>`).join('')||'<div class="muted">沒有符合的原料</div>';}
function switchTabDirect(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('panel-'+id).classList.add('active');document.querySelector(`.tab[onclick*="${id}"]`)?.classList.add('active');renderFormula();}
function openDrawer(id){currentId=id;const m=db.find(x=>x.id===id);if(!m)return;document.getElementById('drawerTitle').textContent=m.en;document.getElementById('drawerSub').textContent=m.cn||'';document.getElementById('drawerContent').innerHTML=drawerHtml(m);document.getElementById('drawerBg').classList.add('open');}
function closeDrawer(){document.getElementById('drawerBg').classList.remove('open');currentId=null;}
function drawerBackdrop(e){if(e.target.id==='drawerBg')closeDrawer();}
function drawerHtml(m){return `<div class="form-grid"><div class="fg"><label>英文名稱</label><input id="d_en" value="${esc(m.en)}"></div><div class="fg"><label>中文名稱</label><input id="d_cn" value="${esc(m.cn)}"></div><div class="fg"><label>類型</label><select id="d_kind"><option ${m.kind==='單體'?'selected':''}>單體</option><option ${m.kind==='精油'?'selected':''}>精油</option><option ${m.kind==='香基'?'selected':''}>香基</option></select></div><div class="fg"><label>前中後調</label><input id="d_note" value="${esc((m.note||[]).join(', '))}"></div><div class="fg"><label>香調分類</label><input id="d_type" value="${esc((m.type||[]).join(', '))}"></div><div class="fg"><label>CAS</label><input id="d_cas" value="${esc(m.cas)}"></div><div class="fg full"><label>INCI</label><input id="d_inci" value="${esc(m.inci)}"></div><div class="fg full"><label>IFRA / 合規備註</label><textarea id="d_ifra">${esc(m.ifra)}</textarea></div><div class="fg full"><label>我的聞香感受</label><textarea id="d_personal">${esc(m.personal)}</textarea></div><div class="fg full"><label>建議記錄</label><div id="advisorList">${renderAdvisors(m)}</div><button class="btn" onclick="addAdvisor()">＋ 新增建議者</button></div></div><div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn dark" onclick="saveDrawer()">儲存原料</button><button class="btn danger" onclick="deleteMaterial()">刪除原料</button></div>`;}
function renderAdvisors(m){return (m.advisors||[]).map((a,i)=>`<div class="advisor"><div class="advisor-head"><input data-adv-name="${i}" value="${esc(a.name)}" placeholder="建議者姓名"><button class="mini" onclick="removeAdvisor(${i})">刪除</button></div><textarea data-adv-text="${i}" placeholder="填入建議內容…">${esc(a.text)}</textarea></div>`).join('')||'<div class="muted">尚無建議記錄</div>';}
function saveDrawer(){const m=db.find(x=>x.id===currentId);if(!m)return;Object.assign(m,{en:cleanLabel(d_en.value.trim()),cn:cleanLabel(d_cn.value.trim()),kind:d_kind.value,note:d_note.value.split(',').map(x=>x.trim()).filter(Boolean),type:d_type.value.split(',').map(x=>cleanLabel(x.trim())).filter(Boolean),cas:d_cas.value.trim(),inci:d_inci.value.trim(),ifra:cleanLabel(d_ifra.value),personal:cleanLabel(d_personal.value)});if(m.kind==='香基'&&!m.type.includes('香基'))m.type.unshift('香基');if(m.kind==='精油'&&!m.type.includes('精油'))m.type.unshift('精油');if(m.kind==='單體')m.type=m.type.filter(t=>t!=='香基'&&t!=='精油');m.advisors=[...document.querySelectorAll('[data-adv-name]')].map(inp=>{const i=inp.dataset.advName;return {name:inp.value,text:document.querySelector(`[data-adv-text="${i}"]`).value};});normalizeItem(m);saveDb();renderLibrary();renderFormula();openDrawer(m.id);}
function addAdvisor(){const m=db.find(x=>x.id===currentId);if(!m)return;m.advisors=m.advisors||[];m.advisors.push({name:'',text:''});document.getElementById('advisorList').innerHTML=renderAdvisors(m);}
function removeAdvisor(i){const m=db.find(x=>x.id===currentId);if(!m)return;m.advisors.splice(i,1);document.getElementById('advisorList').innerHTML=renderAdvisors(m);}
function deleteMaterial(){if(!currentId)return;if(confirm('確定刪除此原料？')){db=db.filter(x=>x.id!==currentId);saveDb();closeDrawer();renderLibrary();renderFormula();}}
function openNewMaterial(){const id=Math.max(0,...db.map(x=>+x.id||0))+1;db.push({id,en:'New Material',cn:'',note:[],type:[],alias:[],cas:'',inci:'',ifra:'',personal:'',advisors:[],kind:'單體'});saveDb();renderLibrary();openDrawer(id);}
let rows=[];
function loadFormula(){try{const saved=JSON.parse(localStorage.getItem(FORMULA_KEY)||'null');if(saved){rows=saved.rows||[];['studentName','classSession','workName','perfumeCapacity','perfumeConcentration','formulaDate','weather','temperature','quickNote','designNote'].forEach(id=>{if(saved[id]!=null&&document.getElementById(id))document.getElementById(id).value=saved[id];});}}catch(e){} if(!rows.length){for(let i=0;i<8;i++)addFormulaRow(null,false);}}
function materialOptions(selected){return '<option value="">選擇原料…</option>'+sortedMaterials().map(m=>`<option value="${m.id}" ${String(selected)===String(m.id)?'selected':''}>${esc(materialLabel(m))}</option>`).join('');}
function emptyFormulaRow(){return {materialId:'',concentration:'10%',amount:'',unit:'g',reason:''};}
function isFormulaRowEmpty(r){return !String(r.materialId||'').trim()&&!String(r.amount||'').trim()&&!String(r.reason||'').trim();}
function addFormulaRow(mid=null,rerender=true){
  if(mid){
    const emptyIndex=rows.findIndex(isFormulaRowEmpty);
    const next={materialId:mid,concentration:'10%',amount:'',unit:'g',reason:''};
    if(emptyIndex>=0){rows[emptyIndex]=next;}else{rows.push(next);}
  }else{
    rows.push(emptyFormulaRow());
  }
  if(rerender)renderFormula();
}
function removeRow(i){rows.splice(i,1);renderFormula();}
function parseConcentration(v){let s=String(v??'').trim();if(!s)return 100;s=s.replace('%','').trim();let n=parseFloat(s);if(!isFinite(n))return 100;if(n>0&&n<=1)n=n*100;return Math.max(0,n);}
function num(v){const n=parseFloat(String(v??'').replace(',','.'));return isFinite(n)?n:0;}
function rowWeight(r){return parseConcentration(r.concentration)*num(r.amount);}
function collectRowsFromDom(){const trs=[...document.querySelectorAll('#formulaRows tr')];rows=trs.map(tr=>({materialId:tr.querySelector('.r-material').value,concentration:tr.querySelector('.r-conc').value,amount:tr.querySelector('.r-amount').value,unit:tr.querySelector('.r-unit').value,reason:tr.querySelector('.r-reason').value}));}
function recalc(){collectRowsFromDom();const totalG=rows.filter(r=>r.unit==='g').reduce((s,r)=>s+num(r.amount),0);const totalDrops=rows.filter(r=>r.unit==='滴').reduce((s,r)=>s+num(r.amount),0);const dropWeight=rows.filter(r=>r.unit==='滴').reduce((s,r)=>s+rowWeight(r),0);const cap=num(document.getElementById('perfumeCapacity').value);const fragrancePct=parseConcentration(document.getElementById('perfumeConcentration')?.value||'20%');const targetFragranceG=cap*fragrancePct/100;const mixed=totalG>0&&totalDrops>0;document.getElementById('mixWarn').classList.toggle('show',mixed);document.getElementById('totalG').textContent=totalG.toFixed(3).replace(/\.0+$/,'')+' g';document.getElementById('totalDrops').textContent=totalDrops.toFixed(1).replace(/\.0$/,'')+' 滴';document.getElementById('totalDropWeight').textContent=dropWeight.toFixed(2).replace(/\.00$/,'');document.getElementById('totalCapacity').textContent=cap.toFixed(2).replace(/\.00$/,'')+' g';if(document.getElementById('totalFragranceG'))document.getElementById('totalFragranceG').textContent=targetFragranceG.toFixed(3).replace(/\.0+$/,'')+' g';[...document.querySelectorAll('#formulaRows tr')].forEach((tr,i)=>{const r=rows[i];let pct=0;if(r.unit==='g')pct=totalG?num(r.amount)/totalG*100:0;else pct=dropWeight?rowWeight(r)/dropWeight*100:0;const targetG=pct&&targetFragranceG?targetFragranceG*pct/100:0;tr.querySelector('.r-percent').textContent=pct?pct.toFixed(2)+'%':'—';tr.querySelector('.r-target').textContent=targetG?targetG.toFixed(3)+' g':'—';r.rowPercent=pct?pct.toFixed(2)+'%':'';r.rowPercentNumber=pct;r.targetIngredientG=+targetG.toFixed(3);});storeFormulaState();}
function renderFormula(){const tbody=document.getElementById('formulaRows');if(!tbody)return;tbody.innerHTML=rows.map((r,i)=>`<tr><td>${i+1}</td><td><select class="r-material" onchange="recalc()">${materialOptions(r.materialId)}</select></td><td><input class="r-conc narrow" value="${esc(r.concentration||'10%')}" oninput="recalc()" placeholder="10%"></td><td><input class="r-amount narrow" type="number" step="0.001" value="${esc(r.amount)}" oninput="recalc()" placeholder="0"></td><td><select class="r-unit" onchange="recalc()"><option ${r.unit==='g'?'selected':''}>g</option><option ${r.unit==='滴'?'selected':''}>滴</option></select></td><td class="calc r-percent">—</td><td class="calc r-target">—</td><td><input class="r-reason" value="${esc(r.reason)}" oninput="recalc()" placeholder="選用此原料的原因…"></td><td><button class="mini" onclick="removeRow(${i})">×</button></td></tr>`).join('');recalc();}
function buildPayload(){const materialMap=Object.fromEntries(db.map(m=>[String(m.id),m]));const cap=num(perfumeCapacity.value);const fragrancePct=parseConcentration(perfumeConcentration?.value||'20%');return {studentName:studentName.value,classSession:classSession.value,workName:workName.value,formulaDate:formulaDate.value,weather:weather.value,temperature:temperature.value,quickNote:quickNote.value,note:designNote.value,perfumeCapacity:cap,perfumeConcentration:perfumeConcentration?.value||'',perfumeConcentrationPercent:fragrancePct,totals:{materialTotalG:num(totalG.textContent),materialTotalDrops:num(totalDrops.textContent),dropWeightTotal:num(totalDropWeight.textContent),perfumeCapacityG:cap,targetFragranceG:num(totalFragranceG?.textContent)},formula:rows.map((r,i)=>{const m=materialMap[String(r.materialId)]||{};return {index:i+1,materialId:r.materialId,materialEn:m.en||'',materialCn:m.cn||'',kind:m.kind||'',types:m.type||[],concentration:r.concentration,concentrationPercent:parseConcentration(r.concentration),amount:num(r.amount),unit:r.unit,rowPercent:r.rowPercent,rowPercentNumber:r.rowPercentNumber,targetIngredientG:r.targetIngredientG,reason:r.reason};})};}
function storeFormulaState(){if(!document.getElementById('studentName'))return;localStorage.setItem(FORMULA_KEY,JSON.stringify({...buildPayload(),rows}));}
function formulaPayload(){collectRowsFromDom();recalc();return buildPayload();}
function saveFormula(show=true){collectRowsFromDom();recalc();storeFormulaState();if(show)flash('已儲存在本機');}
function flash(msg){const el=document.getElementById('submitMsg');el.textContent=msg;setTimeout(()=>{if(el.textContent===msg)el.textContent='';},2500);}
function downloadFormula(){const data=JSON.stringify(formulaPayload(),null,2);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));a.download='hfugue-formula.json';a.click();URL.revokeObjectURL(a.href);}
async function submitFormula(){const endpoint=(window.HFUGUE_CONFIG&&window.HFUGUE_CONFIG.SUBMIT_ENDPOINT)||SUBMIT_FALLBACK;if(!endpoint){flash('尚未設定送出網址');return;}try{flash('送出中…');const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(formulaPayload())});const txt=await res.text();flash('已送出給 Hana 老師');}catch(err){console.error(err);flash('送出失敗，請改下載 JSON 備份');}}
function init(){loadDb();renderLibrary();loadFormula();const d=new Date();if(!formulaDate.value)formulaDate.value=d.toISOString().slice(0,10);renderFormula();}
init();
</script>

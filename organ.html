<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.Fugue 調香台 Organ｜by Hana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF8F3;--ink:#1A1714;--ink-light:#5C5650;--ink-faint:#9E998F;--border:#E5E0D5;--border-dark:#C8C1B3;--accent:#3D6B4F;--accent-light:#EAF2EC;--accent-mid:#6B9E7F;--gold:#B8924A;--gold-light:#FAF0DC;--warn:#C5593A;--warn-light:#FAEAE5;--card:#FFFFFF;--top-bg:#E8F0FF;--top-text:#2A4080;--mid-bg:#EAF2EC;--mid-text:#2A5040;--base-bg:#FFF0DC;--base-text:#7A4010;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6}
.app-header{background:var(--ink);color:var(--cream);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:60}
.app-logo{font-family:'DM Serif Display',serif;font-size:18px;display:flex;align-items:baseline;gap:10px}
.app-logo span{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--gold)}
.header-right{display:flex;align-items:center;gap:8px}
.count-badge{font-size:11px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.07);padding:3px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.1)}
.btn-add-header{background:var(--gold);color:var(--ink);border:none;padding:7px 15px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;font-family:'DM Sans',sans-serif}
.btn-add-header:hover{opacity:.82}
.tabs-bar{background:var(--card);border-bottom:1px solid var(--border);display:flex;padding:0 28px;position:sticky;top:58px;z-index:55}
.tab-btn{padding:12px 20px;font-size:13px;font-weight:500;border:none;background:none;color:var(--ink-faint);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.tab-btn:hover{color:var(--ink-light)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}
/* toolbar */
.toolbar-toggle-row{padding:8px 28px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:107px;z-index:46;display:flex;justify-content:flex-end}
.btn-toolbar-toggle{border:1px solid var(--border-dark);background:#fff;color:var(--ink-light);border-radius:999px;padding:6px 14px;font-size:12px;letter-spacing:.04em;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-toolbar-toggle:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.toolbar{padding:10px 28px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:145px;z-index:40}
.toolbar.is-collapsed{display:none}
.toolbar-section{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.toolbar-sep{width:1px;height:18px;background:var(--border-dark);flex-shrink:0;margin:0 2px}
.tlabel{font-size:10px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px}
.search-wrap input{width:100%;padding:6px 10px 6px 30px;border:1px solid var(--border-dark);border-radius:8px;font-size:13px;background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;transition:border-color .15s}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap::before{content:'⌕';position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:14px}
.chip{padding:3px 10px;border-radius:20px;font-size:11px;border:1px solid var(--border-dark);cursor:pointer;background:var(--cream);color:var(--ink-light);transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.sort-chip{padding:3px 10px;border-radius:20px;font-size:11px;border:1px solid var(--border-dark);cursor:pointer;background:var(--cream);color:var(--ink-light);transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.sort-chip:hover{border-color:var(--gold);color:var(--gold)}
.sort-chip.active{background:var(--gold-light);border-color:var(--gold);color:var(--gold);font-weight:500}
.sort-dir{font-size:9px;opacity:.7;margin-left:1px}
/* grid */
.main{padding:18px 28px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;position:relative}
.card:hover{border-color:var(--accent-mid);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.07)}
.card-num{font-size:10px;color:var(--ink-faint);font-weight:500;letter-spacing:.08em;margin-bottom:3px}
.card-en{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.card-cn{font-size:12px;color:var(--ink-light)}
.card-cas{font-size:10px;color:var(--ink-faint);font-family:monospace;margin-top:6px}
.card-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-Top{background:var(--top-bg);color:var(--top-text)}
.badge-Middle{background:var(--mid-bg);color:var(--mid-text)}
.badge-Base{background:var(--base-bg);color:var(--base-text)}
.badge-type{background:var(--cream);color:var(--ink-light);border:1px solid var(--border)}
.card-del{position:absolute;top:8px;right:8px;width:20px;height:20px;border:none;background:none;color:var(--ink-faint);font-size:12px;cursor:pointer;border-radius:4px;display:none;align-items:center;justify-content:center;transition:color .15s,background .15s}
.card:hover .card-del{display:flex}
.card-del:hover{color:var(--warn);background:var(--warn-light)}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--ink-faint)}
/* drawer */
.overlay{position:fixed;inset:0;background:rgba(10,8,6,.5);z-index:100;display:flex;align-items:stretch;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.drawer{width:560px;max-width:100vw;background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(40px);transition:transform .25s cubic-bezier(.16,1,.3,1);overflow:hidden}
.overlay.open .drawer{transform:translateX(0)}
.drawer-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;flex-shrink:0}
.drawer-head-info{flex:1}
.drawer-head-title{font-family:'DM Serif Display',serif;font-size:17px;line-height:1.2;margin-bottom:2px}
.drawer-head-sub{font-size:12px;color:var(--ink-faint)}
.drawer-close{background:none;border:1px solid var(--border-dark);border-radius:6px;padding:4px 11px;font-size:12px;color:var(--ink-light);cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;transition:background .15s}
.drawer-close:hover{background:var(--cream)}
.drawer-scroll{flex:1;overflow-y:auto;padding:16px 20px}
.drawer-scroll::-webkit-scrollbar{width:4px}
.drawer-scroll::-webkit-scrollbar-thumb{background:var(--border-dark);border-radius:2px}
.fields{display:flex;flex-direction:column;gap:13px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-group{display:flex;flex-direction:column;gap:5px}
.field-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint)}
.field-input{padding:7px 10px;border:1px solid var(--border-dark);border-radius:8px;font-size:13px;background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;transition:border-color .15s;width:100%}
.field-input:focus{outline:none;border-color:var(--accent);background:#fff}
.field-mono{font-family:monospace;font-size:12px}
.field-textarea{min-height:74px;resize:vertical;line-height:1.6}
.field-divider{height:1px;background:var(--border);margin:2px 0}
.tag-select{display:flex;gap:5px;flex-wrap:wrap}
.tag-btn{padding:3px 10px;border-radius:20px;font-size:12px;border:1px solid var(--border-dark);cursor:pointer;background:var(--cream);color:var(--ink-light);transition:all .15s;font-family:'DM Sans',sans-serif}
.tag-btn.active-Top{background:var(--top-bg);border-color:var(--top-text);color:var(--top-text)}
.tag-btn.active-Middle{background:var(--mid-bg);border-color:var(--mid-text);color:var(--mid-text)}
.tag-btn.active-Base{background:var(--base-bg);border-color:var(--base-text);color:var(--base-text)}
.tag-btn.active-type{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.section-personal{border-radius:10px;overflow:hidden}
.section-personal .section-header{padding:7px 12px;font-size:11px;font-weight:500;background:var(--accent-light);color:var(--accent)}
.section-personal .field-textarea{border-radius:0 0 10px 10px;border-top:none;border-color:#A8D4B8;background:#F5FAF7;min-height:90px}
.section-personal .field-textarea:focus{background:#fff;border-color:var(--accent)}
.advisors-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.advisors-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint)}
.btn-add-advisor{background:none;border:1px dashed var(--border-dark);color:var(--ink-light);padding:3px 12px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-add-advisor:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-light)}
.advisors-list{display:flex;flex-direction:column;gap:9px}
.advisor-block{border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.advisor-top{display:flex;align-items:center;gap:8px;padding:6px 10px}
.advisor-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.advisor-name-input{flex:1;border:none;border-bottom:1px solid transparent;background:transparent;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;padding:1px 2px;outline:none;min-width:0;border-radius:2px;transition:border-color .15s,background .15s;cursor:text}
.advisor-name-input:hover{border-bottom-color:rgba(0,0,0,.2);background:rgba(255,255,255,.35)}
.advisor-name-input:focus{border-bottom-color:rgba(0,0,0,.45);background:rgba(255,255,255,.6)}
.advisor-name-input::placeholder{opacity:.45;font-style:italic;font-weight:400}
.advisor-name-hint{font-size:10px;opacity:0;transition:opacity .2s;margin-left:2px;flex-shrink:0}
.advisor-top:hover .advisor-name-hint{opacity:.5}
.advisor-del-btn{background:none;border:none;color:rgba(0,0,0,.25);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:3px;line-height:1;transition:color .15s;flex-shrink:0}
.advisor-del-btn:hover{color:var(--warn)}
.advisor-text{width:100%;border:none;border-top:1px solid rgba(0,0,0,.08);padding:8px 10px;font-size:13px;line-height:1.6;resize:vertical;min-height:68px;font-family:'DM Sans',sans-serif;background:transparent;display:block}
.advisor-text:focus{outline:none}
.advisor-empty{text-align:center;padding:16px;color:var(--ink-faint);font-size:12px;border:1px dashed var(--border-dark);border-radius:10px}
.drawer-footer{padding:11px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0;background:var(--cream)}
.btn-save{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;font-family:'DM Sans',sans-serif}
.btn-save:hover{opacity:.85}
.btn-delete{background:none;border:1px solid var(--border-dark);color:var(--warn);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.btn-delete:hover{background:var(--warn-light)}
.saved-flash{font-size:12px;color:var(--accent);opacity:0;transition:opacity .3s;margin-left:2px}
.saved-flash.show{opacity:1}
/* formula tab */
.formula-layout{display:flex;height:calc(100vh - 107px);overflow:hidden}
.formula-sidebar{width:250px;flex-shrink:0;border-right:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;overflow:hidden}
.formula-sidebar-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.formula-sidebar-title{font-size:11px;font-weight:500;color:var(--ink-light);letter-spacing:.05em;text-transform:uppercase}
.btn-new-formula{background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.btn-new-formula:hover{opacity:.85}
.formula-list{flex:1;overflow-y:auto;padding:8px}
.formula-list::-webkit-scrollbar{width:3px}
.formula-list::-webkit-scrollbar-thumb{background:var(--border-dark);border-radius:2px}
.formula-item{padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:all .15s}
.formula-item:hover{background:var(--cream);border-color:var(--border)}
.formula-item.active{background:var(--accent-light);border-color:var(--accent-mid)}
.fi-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-meta{font-size:11px;color:var(--ink-faint);margin-top:2px}
.formula-empty-sidebar{padding:24px 14px;text-align:center;color:var(--ink-faint);font-size:12px}
.formula-main{flex:1;overflow-y:auto;padding:22px 30px 60px;min-width:0}
.formula-main::-webkit-scrollbar{width:5px}
.formula-main::-webkit-scrollbar-thumb{background:var(--border-dark);border-radius:3px}
.formula-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ink-faint);gap:12px}
.formula-placeholder .ph-icon{font-size:36px}
.formula-placeholder p{font-size:13px}
/* formula editor */
.fe-section{margin-bottom:26px}
.fe-section-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.fe-grid{display:grid;gap:10px}
.fe-grid-2{grid-template-columns:1fr 1fr}
.fe-grid-3{grid-template-columns:1fr 1fr 1fr}
.fe-grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.fe-field{display:flex;flex-direction:column;gap:5px}
.fe-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint)}
.fe-input{padding:8px 10px;border:1px solid var(--border-dark);border-radius:8px;font-size:13px;background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;transition:border-color .15s;width:100%}
.fe-input:focus{outline:none;border-color:var(--accent);background:#fff}
.fe-textarea{min-height:90px;resize:vertical;line-height:1.6}
/* ingredient table */
.ing-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px}
.ing-table{width:100%;border-collapse:collapse;min-width:960px}
.ing-table th{padding:8px 10px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);background:var(--cream);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.ing-table th:first-child{width:34px;text-align:center}
.ing-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.ing-table tr:last-child td{border-bottom:none}
.ing-table tr:hover td{background:#FAFAF8}
.it-num{font-size:11px;color:var(--ink-faint);text-align:center;font-weight:500}
.it-select{width:100%;padding:5px 8px;border:1px solid var(--border-dark);border-radius:6px;font-size:12px;background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;cursor:pointer;min-width:160px}
.it-select:focus{outline:none;border-color:var(--accent)}
.it-conc{width:92px;padding:5px 8px;border:1px solid var(--border-dark);border-radius:6px;font-size:12px;background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif}
.it-conc:focus{outline:none;border-color:var(--accent);background:#fff}
.it-num-input{width:68px;padding:5px 6px;border:1px solid var(--border-dark);border-radius:6px;font-size:12px;background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;text-align:right}
.it-num-input:focus{outline:none;border-color:var(--accent);background:#fff}
.it-unit{padding:5px 6px;border:1px solid var(--border-dark);border-radius:6px;font-size:11px;background:var(--cream);color:var(--ink-light);font-family:'DM Sans',sans-serif;cursor:pointer}
.it-unit:focus{outline:none;border-color:var(--accent)}
.it-target-g{text-align:right;font-variant-numeric:tabular-nums;color:var(--accent);font-weight:500}
.it-pct{font-size:12px;color:var(--accent);font-weight:500;text-align:right;white-space:nowrap;padding:0 6px;min-width:56px}
.it-reason{width:100%;padding:5px 7px;border:1px solid var(--border-dark);border-radius:6px;font-size:12px;background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;min-width:150px}
.it-reason:focus{outline:none;border-color:var(--accent);background:#fff}
.it-del{background:none;border:none;color:var(--ink-faint);font-size:13px;cursor:pointer;padding:4px;border-radius:4px;transition:color .15s}
.it-del:hover{color:var(--warn)}
.it-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:7px;font-weight:500;vertical-align:middle;margin-left:3px}
/* stat cards */
.formula-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);margin-bottom:3px}
.stat-val{font-size:20px;font-weight:500;color:var(--ink)}
.stat-val.accent{color:var(--accent)}
.stat-sub{font-size:11px;color:var(--ink-faint)}
.btn-add-row{background:none;border:1px dashed var(--border-dark);color:var(--ink-light);padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;margin-top:10px}
.btn-add-row:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.btn-formula-save{background:var(--accent);color:#fff;border:none;padding:9px 22px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.btn-formula-save:hover{opacity:.85}
.btn-formula-del{background:none;border:1px solid var(--border-dark);color:var(--warn);padding:9px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.btn-formula-del:hover{background:var(--warn-light)}
.formula-action-bar{display:flex;gap:10px;align-items:center;margin-top:8px;padding-top:20px;border-top:1px solid var(--border)}
.formula-saved-flash{font-size:12px;color:var(--accent);opacity:0;transition:opacity .3s}
.formula-saved-flash.show{opacity:1}
/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(10,8,6,.55);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:16px;padding:24px;width:440px;max-width:calc(100vw - 32px);border:1px solid var(--border);transform:scale(.96);transition:transform .2s cubic-bezier(.16,1,.3,1)}
.modal-backdrop.open .modal{transform:scale(1)}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:5px}
.modal-sub{font-size:13px;color:var(--ink-light);margin-bottom:16px}
.modal-fields{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{background:none;border:1px solid var(--border-dark);padding:7px 15px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--ink-light);font-family:'DM Sans',sans-serif}
.btn-confirm{background:var(--accent);color:#fff;border:none;padding:7px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.btn-confirm.danger{background:var(--warn)}
.btn-confirm:hover{opacity:.85}
@media(max-width:800px){.formula-sidebar{width:190px}.fe-grid-3,.fe-grid-4{grid-template-columns:1fr 1fr}}

    const key=(item.en||'').toLowerCase()+'|'+(item.cn||'');
    if(!existing.has(key)){db.push({...item});changed=true;}
  });
  if(changed)save();
}

function updateSortDir(key){const el=document.getElementById('dir-'+key);if(!el)return;const d=sortDirs[key];if(key==='en')el.textContent=d>0?'A↓':'Z↓';else if(key==='note')el.textContent=d>0?'↓':'↑';else if(key==='type')el.textContent=d>0?'A↓':'Z↓';}
function noteRank(item){return Math.min(...(item.note||[]).map(n=>NOTE_ORDER[n]??9),9);}
function sortItems(items){
  if(sortKey==='default')return items;
  return[...items].sort((a,b)=>{
    if(sortKey==='en'){const va=(a.en||'').toLowerCase(),vb=(b.en||'').toLowerCase();return va<vb?-sortDirs.en:va>vb?sortDirs.en:0;}
    if(sortKey==='note')return(noteRank(a)-noteRank(b))*sortDirs.note;
    if(sortKey==='type'){const va=([...a.type||[]].sort()[0]||'').toLowerCase(),vb=([...b.type||[]].sort()[0]||'').toLowerCase();return va<vb?-sortDirs.type:va>vb?sortDirs.type:0;}
    return 0;
  });
}

function concentrationFactor(raw){
  const s=String(raw||'').trim();
  if(!s)return 1;
  const m=s.match(/([0-9]+(?:\.[0-9]+)?)/);
  if(!m)return 1;
  const n=parseFloat(m[1]);
  if(!isFinite(n))return 1;
  if(s.includes('%'))return n/100;
  if(n>1)return n/100;
  return n;
}
function calcTotals(f){
  let molG=0,totalDrops=0,weightedDrops=0;
  (f.rows||[]).forEach(r=>{
    const amt=parseFloat(r.amount)||0;
    if(!amt)return;
    if(r.unit==='滴'){
      totalDrops+=amt;
      weightedDrops += concentrationFactor(r.concentration) * amt;
    }else{
      molG+=amt;
    }
  });
  const perfumeCapacityG=parseFloat(f.perfumeCapacityG ?? f.alcoholG)||0;
  return{molG,totalDrops,weightedDrops,perfumeCapacityG,totalG:perfumeCapacityG};
}
function rowPctNumber(r,totals){
  const amt=parseFloat(r.amount)||0;
  if(!amt)return null;
  if(r.unit==='滴'){
    if(!totals.weightedDrops)return null;
    const weighted=concentrationFactor(r.concentration)*amt;
    return weighted/totals.weightedDrops*100;
  }
  if(!totals.molG)return null;
  return amt/totals.molG*100;
}
function rowPct(r,totals){
  const p=rowPctNumber(r,totals);
  return p==null?'—':p.toFixed(2)+'%';
}
function rowTargetG(r,totals){
  const p=rowPctNumber(r,totals);
  const cap=totals.perfumeCapacityG||0;
  if(p==null||!cap)return'—';
  return (cap*p/100).toFixed(3)+'g';
}

function buildStats(f,molG,totalDrops,weightedDrops,perfumeCapacityG,totalG){return`<div class="stat-card"><div class="stat-label">香料總克數</div><div class="stat-val accent">${molG.toFixed(3)}g</div><div class="stat-sub">g 欄位比例以香料總克數計算</div></div><div class="stat-card"><div class="stat-label">香料總滴數</div><div class="stat-val accent">${totalDrops.toFixed(0)}滴</div><div class="stat-sub">滴數比例以「原料濃度 × 滴數」加權計算</div></div><div class="stat-card"><div class="stat-label">加權滴數總和</div><div class="stat-val">${weightedDrops.toFixed(3)}</div><div class="stat-sub">Σ（濃度 × 滴數）</div></div><div class="stat-card"><div class="stat-label">香水容量</div><div class="stat-val accent">${perfumeCapacityG.toFixed(3)}g</div><div class="stat-sub">依佔比換算每項原料 g 數</div></div><div class="stat-card"><div class="stat-label">使用原料數</div><div class="stat-val">${f.rows.filter(r=>r.ingId).length}</div><div class="stat-sub">已選擇原料行</div></div>`;}
function refreshStats(){
  const f=currentFml();if(!f)return;
  const totals=calcTotals(f);
  const{molG,totalDrops,weightedDrops,perfumeCapacityG,totalG}=totals;
  const el=document.getElementById('fml-stats');if(el)el.innerHTML=buildStats(f,molG,totalDrops,weightedDrops,perfumeCapacityG,totalG);
  const tbody=document.getElementById('ing-tbody');if(!tbody)return;
  const trs=tbody.querySelectorAll('tr');
  f.rows.forEach((r,i)=>{
    const tr=trs[i];if(!tr)return;
    const tds=tr.querySelectorAll('td');
    if(tds[4])tds[4].textContent=rowPct(r,totals);
    if(tds[5])tds[5].textContent=rowTargetG(r,totals);
  });
}
function fmlMeta(key,val){const f=currentFml();if(!f)return;f[key]=val;if(key==='name')renderFormulaList();}
function fmlRowChange(i,key,val){const f=currentFml();if(!f)return;f.rows[i][key]=val;if(key==='amount'||key==='unit'||key==='ingId'||key==='concentration')refreshStats();}
function fmlAddRow(){const f=currentFml();if(!f)return;f.rows.push(makeEmptyRow());renderFormulaEditor();}
function fmlDelRow(i){const f=currentFml();if(!f)return;if(f.rows.length<=1)return;f.rows.splice(i,1);renderFormulaEditor();}
function saveFormula(){saveFml();renderFormulaList();const fl=document.getElementById('fml-saved-flash');if(fl){fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),2000);}}
function deleteFormula(){const f=currentFml();if(!f)return;deleteTarget=f.id;deleteType='formula';document.getElementById('modal-del-msg').textContent=`即將刪除配方「${f.name||'（未命名）'}」，此動作無法復原。`;openModal('modal-del');}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-backdrop').forEach(b=>{b.addEventListener('click',e=>{if(e.target===b)b.classList.remove('open');});});
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function serializeCurrentFormula(){
  const f=currentFml();
  if(!f)return null;
  const totals=calcTotals(f);
  return {
    source:'H.Fugue 調香台 Organ',
    submittedAt:new Date().toISOString(),
    totals,
    formula:{...f, rows:(f.rows||[]).map((r,i)=>{
      const ing=db.find(d=>String(d.id)===String(r.ingId));
      return {...r, index:i+1, rowPercent:rowPct(r,totals), rowPercentNumber:rowPctNumber(r,totals), targetIngredientG:rowTargetG(r,totals), ingredientEn:ing?.en||'', ingredientCn:ing?.cn||'', ingredientCas:ing?.cas||'', ingredientType:ing?.type||[], ingredientNote:ing?.note||[]};
    })}
  };
}
function setSubmitStatus(msg, ok=false){
  const el=document.getElementById('fml-submit-flash');
  if(el){el.textContent=msg;el.style.color=ok?'var(--accent)':'var(--ink-faint)';}
}
function downloadCurrentFormula(){
  const payload=serializeCurrentFormula();
  if(!payload){setSubmitStatus('請先選擇或新增配方');return;}
  const safe=(payload.formula.name||'formula').replace(/[\\/:*?"<>|\s]+/g,'_');
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`HFugue_${safe}_${Date.now()}.json`;
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
  setSubmitStatus('已下載配方備份',true);
}
async function submitFormulaToHana(){
  saveFormula();
  const payload=serializeCurrentFormula();
  if(!payload){setSubmitStatus('請先選擇或新增配方');return;}
  const endpoint=window.HFUGUE_CONFIG&&window.HFUGUE_CONFIG.SUBMIT_ENDPOINT;
  if(!endpoint){setSubmitStatus('尚未設定送出網址，已改下載備份');downloadCurrentFormula();return;}
  try{
    setSubmitStatus('送出中…');
    const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'cors'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    setSubmitStatus('已送出給 Hana 老師',true);
  }catch(e){
    setSubmitStatus('送出失敗，已改下載備份');
    downloadCurrentFormula();
  }
}

load();renderGrid();renderFormulaList();
</script>

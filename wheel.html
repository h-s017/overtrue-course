<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>H FUGUE Atelier | 香調輪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FAF8F3;--ink:#1A1714;--ink-light:#5C5650;--ink-faint:#9E998F;
  --border:#E5E0D5;--border-dark:#C8C1B3;
  --accent:#3D6B4F;--accent-light:#EAF2EC;--accent-mid:#6B9E7F;
  --gold:#B8924A;--gold-light:#FAF0DC;
  --warn:#C5593A;--warn-light:#FAEAE5;
  --card:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6;overflow:hidden}

.app-header{background:var(--ink);color:var(--cream);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:60;height:58px}
.app-logo{font-family:'DM Serif Display',serif;font-size:18px;display:flex;align-items:baseline;gap:10px}
.app-logo .sub{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--gold)}
.header-badge{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.08em;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:3px 12px;border-radius:20px}

.page{display:flex;height:calc(100vh - 58px);overflow:hidden}

/* Wheel side */
.wheel-col{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;min-width:0;overflow:hidden}
svg{max-width:100%;max-height:100%;display:block}

/* path transitions */
path.seg{transition:opacity .18s ease,filter .14s ease;}
path.seg.faded{opacity:.18}
path.seg.hi{filter:brightness(.84) saturate(1.4);}

/* Info side */
.info-col{width:300px;flex-shrink:0;border-left:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;height:100%;overflow:hidden}

/* Search bar */
.search-bar{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap{position:relative}
.search-wrap input{
  width:100%;padding:8px 12px 8px 34px;
  border:1px solid var(--border-dark);border-radius:8px;
  font-size:13px;background:var(--cream);color:var(--ink);
  font-family:'DM Sans',sans-serif;transition:border-color .15s;
}
.search-wrap input:focus{outline:none;border-color:var(--accent);background:#fff}
.search-wrap input::placeholder{color:var(--ink-faint)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:14px;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:14px;
  display:none;line-height:1;padding:2px;border-radius:3px;transition:color .12s}
.search-clear:hover{color:var(--ink)}
.search-count{font-size:11px;color:var(--ink-faint);margin-top:6px;display:none}

/* Info body */
.info-body{flex:1;overflow-y:auto;padding:16px}
.info-body::-webkit-scrollbar{width:3px}
.info-body::-webkit-scrollbar-thumb{background:var(--border-dark);border-radius:2px}

.info-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;color:var(--ink-faint);text-align:center;gap:10px;padding:20px}
.ph-icon{font-size:24px;opacity:.3}
.ph-text{font-size:12px;line-height:1.8}

/* Hover info */
.info-family-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:10px;border:1px solid}
.info-sub-name{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:2px}
.info-sub-en{font-size:11px;color:var(--ink-faint);letter-spacing:.06em;margin-bottom:14px}
.notes-grid{display:flex;flex-wrap:wrap;gap:5px}
.note-chip{padding:4px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border-dark);color:var(--ink-light);background:var(--cream);cursor:pointer;transition:all .14s}
.note-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.note-chip.matched{background:var(--gold-light);border-color:var(--gold);color:#7A5010}

/* Search results */
.result-item{padding:10px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:7px;cursor:pointer;transition:all .14s}
.result-item:hover{border-color:var(--accent-mid);background:var(--accent-light)}
.result-family-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:500;margin-bottom:4px;color:var(--ink-faint)}
.result-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.result-sub{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:4px}
.result-notes{display:flex;flex-wrap:wrap;gap:4px}
.result-note{padding:2px 8px;border-radius:10px;font-size:11px;background:var(--cream);border:1px solid var(--border);color:var(--ink-light)}
.result-note.hit{background:var(--gold-light);border-color:var(--gold);color:#7A5010;font-weight:500}
.no-results{text-align:center;padding:30px 16px;color:var(--ink-faint);font-size:13px}

/* Legend */
.legend-section{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.legend-items{display:flex;flex-direction:column;gap:5px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-light);cursor:pointer;padding:2px 4px;border-radius:4px;transition:background .12s}
.legend-item:hover{background:var(--cream)}
.legend-swatch{width:24px;height:8px;border-radius:3px;flex-shrink:0}
.legend-en{color:var(--ink-faint);font-size:10px;margin-left:auto}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">H FUGUE Atelier <span class="sub">by Hana</span></div>
  <div class="header-badge">Fragrance Wheel</div>
</header>

<div class="page">
  <div class="wheel-col">
    <svg id="wheel" viewBox="0 0 600 600" width="600" height="600"></svg>
  </div>

  <div class="info-col">
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="搜尋氣味… 如：玫瑰、琥珀、薰衣草">
        <button class="search-clear" id="searchClear">✕</button>
      </div>
      <div class="search-count" id="searchCount"></div>
    </div>

    <div class="info-body" id="infoBody">
      <div class="info-placeholder">
        <div class="ph-icon">◎</div>
        <p class="ph-text">移至香調輪探索<br>或輸入氣味搜尋</p>
      </div>
    </div>

    <div class="legend-section">
      <div class="legend-items" id="legendItems"></div>
    </div>
  </div>
</div>

<script>
// ── data ──────────────────────────────────────────────────────────────────────
// Color logic: going clockwise, hues blend naturally like a colour wheel.
// Fresh(teal-green) → Fougère(blue-green) → Floral(pink-rose) →
// Chypre(dusty-mauve) → Oriental(amber-peach) → Gourmand(golden) →
// Woody(warm-tan) → back to Fresh.
// Each family has 3 pastel shades: [ring1, ring2, ring3], low saturation.
const FAM={
  fresh:   {n:'清新',e:'Fresh',   c:['#86BCA8','#A8D4C0','#C6E6D6']},
  fougere: {n:'馥奇',e:'Fougère', c:['#86AABC','#A4C4D4','#C2D8E6']},
  floral:  {n:'花香',e:'Floral',  c:['#CC90A8','#E0AEBC','#EEC8D2']},
  chypre:  {n:'西普',e:'Chypre',  c:['#A890B4','#C0ACCA','#D6C4DC']},
  oriental:{n:'東方',e:'Oriental',c:['#CCA07C','#E0BC98','#EED2B4']},
  gourmand:{n:'美食',e:'Gourmand',c:['#C4B05C','#DACC80','#EEDEAA']},
  woody:   {n:'木質',e:'Woody',   c:['#B09870','#C8B48C','#DCCBAA']},
};

// Ring 1 — 4 main families, each 90°
const RING1=[
  {s:0,  e:90, f:'fresh'},
  {s:90, e:180,f:'floral'},
  {s:180,e:270,f:'oriental'},
  {s:270,e:360,f:'woody'},
];

// Ring 2 & 3 — 18 sectors
const SEC=[
  {s:0,  e:22, f:'fresh',   sub:'柑橘',     sube:'Citrus',           ns:['佛手柑','檸檬','橙','葡萄柚','青檸','香橙']},
  {s:22, e:45, f:'fresh',   sub:'水生',     sube:'Aquatic',          ns:['海洋','雨後空氣','海鹽','水蓮','海藻']},
  {s:45, e:68, f:'fresh',   sub:'綠葉',     sube:'Green',            ns:['青草','紫羅蘭葉','無花果葉','番茄葉','苔蘚']},
  {s:68, e:90, f:'fresh',   sub:'草本',     sube:'Aromatic',         ns:['薰衣草','迷迭香','鼠尾草','薄荷','尤加利']},
  {s:90, e:112,f:'fougere', sub:'馥奇',     sube:'Fougère',          ns:['薰衣草','香豆素','橡木苔','雪松','龍涎香']},
  {s:112,e:133,f:'floral',  sub:'柔粉花香', sube:'Soft Floral',      ns:['鳶尾','麝香','粉質感','玫瑰木','玉蘭']},
  {s:133,e:155,f:'floral',  sub:'花束',     sube:'Floral Bouquet',   ns:['玫瑰','茉莉','牡丹','鈴蘭','芍藥','梔子花']},
  {s:155,e:170,f:'floral',  sub:'果香花香', sube:'Fruity Floral',    ns:['桃子','荔枝','覆盆子','黑醋栗','梅']},
  {s:170,e:185,f:'floral',  sub:'花香東方', sube:'Floral Oriental',  ns:['橙花','依蘭','廣藿香','麝香','乳香']},
  {s:185,e:205,f:'chypre',  sub:'西普',     sube:'Chypre',           ns:['橡木苔','岩玫瑰','佛手柑','廣藿香','皮革','岩蘭草']},
  {s:205,e:220,f:'oriental',sub:'柔和東方', sube:'Soft Oriental',    ns:['乳香','蜂蠟','輕琥珀','安息香','沒藥']},
  {s:220,e:242,f:'oriental',sub:'東方',     sube:'Oriental',         ns:['香草','琥珀','麝香','龍涎香','沒藥','安息香']},
  {s:242,e:258,f:'oriental',sub:'木質東方', sube:'Woody Oriental',   ns:['廣藿香','沉香','烏木','香料','雪松']},
  {s:258,e:278,f:'gourmand',sub:'美食',     sube:'Gourmand',         ns:['香草','焦糖','巧克力','蜂蜜','烘焙杏仁','肉桂']},
  {s:278,e:298,f:'woody',   sub:'乾燥木質', sube:'Dry Woods',        ns:['雪松','岩蘭草','煙燻','皮革','柏木']},
  {s:298,e:320,f:'woody',   sub:'木質',     sube:'Woods',            ns:['檀香','廣藿香','松木','柏木','沉香']},
  {s:320,e:340,f:'woody',   sub:'苔蘚木質', sube:'Mossy Woods',      ns:['橡木苔','土壤','蕨類','苔蘚','青苔']},
  {s:340,e:360,f:'woody',   sub:'芳香木質', sube:'Aromatic Woody',   ns:['薰衣草','雪松','香料','廣藿香','迷迭香']},
];

// ── SVG helpers ───────────────────────────────────────────────────────────────
const CX=300,CY=300,GAP=1.2;
const R1i=58,R1o=114,R2i=116,R2o=210,R3i=212,R3o=292;

const svg=document.getElementById('wheel');
function el(tag,a){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(a))e.setAttribute(k,v);
  return e;
}
function pt(r,deg){const a=(deg-90)*Math.PI/180;return[CX+r*Math.cos(a),CY+r*Math.sin(a)];}
function arc(ri,ro,s,e,g=GAP){
  const a=s+g/2,b=e-g/2;
  const[x1,y1]=pt(ri,a),[x2,y2]=pt(ri,b),[x3,y3]=pt(ro,b),[x4,y4]=pt(ro,a);
  const la=(b-a)>180?1:0;
  return`M${x1.toFixed(2)},${y1.toFixed(2)} A${ri},${ri},0,${la},1,${x2.toFixed(2)},${y2.toFixed(2)} L${x3.toFixed(2)},${y3.toFixed(2)} A${ro},${ro},0,${la},0,${x4.toFixed(2)},${y4.toFixed(2)}Z`;
}
function rotTx(mid,r){
  const flip=mid>180&&mid<=360?180:0;
  return`translate(${CX},${CY}) rotate(${mid-90}) translate(${r},0) rotate(${flip})`;
}
function txt(s,a,p){const e=el('text',a);e.textContent=s;p.appendChild(e);return e;}

// ── build wheel ───────────────────────────────────────────────────────────────
// bg
svg.appendChild(el('circle',{cx:CX,cy:CY,r:R3o+14,fill:'#EDE8E0'}));

// Ring 1
for(const r of RING1){
  const f=FAM[r.f];
  const p=el('path',{d:arc(R1i,R1o,r.s,r.e,GAP*.3),fill:f.c[0],class:'seg','data-f':r.f,'data-ring':'1'});
  svg.appendChild(p);
  const mid=(r.s+r.e)/2;
  const g=el('g',{transform:rotTx(mid,(R1i+R1o)/2),'pointer-events':'none'});
  txt(f.n,{x:0,y:-9,'text-anchor':'middle','dominant-baseline':'middle','font-family':"'DM Sans',sans-serif",'font-size':'13.5','font-weight':'500',fill:'rgba(26,23,20,.88)'},g);
  txt(f.e,{x:0,y:9,'text-anchor':'middle','dominant-baseline':'middle','font-family':"'DM Sans',sans-serif",'font-size':'7.5','letter-spacing':'1.5',fill:'rgba(26,23,20,.4)'},g);
  svg.appendChild(g);
}

// Ring 2 & 3
for(let i=0;i<SEC.length;i++){
  const s=SEC[i],f=FAM[s.f],mid=(s.s+s.e)/2,span=s.e-s.s;

  // Ring 2
  const p2=el('path',{d:arc(R2i,R2o,s.s,s.e),fill:f.c[1],class:'seg','data-i':String(i),'data-ring':'2'});
  svg.appendChild(p2);
  const g2=el('g',{transform:rotTx(mid,(R2i+R2o)/2),'pointer-events':'none'});
  const fs2=span<18?7.5:s.sub.length>3?9:11;
  txt(s.sub,{x:0,y:0,'text-anchor':'middle','dominant-baseline':'middle','font-family':"'DM Sans',sans-serif",'font-size':String(fs2),'font-weight':'500',fill:'rgba(26,23,20,.82)'},g2);
  svg.appendChild(g2);

  // Ring 3
  const p3=el('path',{d:arc(R3i,R3o,s.s,s.e),fill:f.c[2],class:'seg','data-i':String(i),'data-ring':'3'});
  svg.appendChild(p3);
  const g3=el('g',{transform:rotTx(mid,(R3i+R3o)/2),'pointer-events':'none'});
  const note3=s.ns.slice(0,span<18?1:2).join(' · ');
  txt(note3,{x:0,y:0,'text-anchor':'middle','dominant-baseline':'middle','font-family':"'DM Sans',sans-serif",'font-size':'7.8',fill:'rgba(26,23,20,.58)'},g3);
  svg.appendChild(g3);

  // events (hover, not search mode)
  [p2,p3].forEach(p=>{
    p.addEventListener('mouseenter',()=>{if(!searchMode)showHover(i);});
    p.addEventListener('mouseleave',()=>{if(!searchMode)clearHover();});
  });
}

// Ring 1 hover
document.querySelectorAll('.seg[data-ring="1"]').forEach(p=>{
  p.addEventListener('mouseenter',()=>{if(!searchMode)showFamilyHover(p.dataset.f);});
  p.addEventListener('mouseleave',()=>{if(!searchMode)clearHover();});
});

// separators
[R1o+1,R2o+1,R3o+1].forEach(r=>svg.appendChild(el('circle',{cx:CX,cy:CY,r,fill:'none',stroke:'#FAF8F3','stroke-width':'2.2'})));

// center
svg.appendChild(el('circle',{cx:CX,cy:CY,r:R1i-1,fill:'#FAF8F3'}));
svg.appendChild(el('circle',{cx:CX,cy:CY,r:R1i-1,fill:'none',stroke:'#E5E0D5','stroke-width':'1.2'}));
const gc=el('g',{'pointer-events':'none'});
txt('H FUGUE',{x:CX,y:CY-8,'text-anchor':'middle','dominant-baseline':'middle','font-family':"'DM Serif Display',serif",'font-size':'11',fill:'#5C5650'},gc);
txt('ATELIER',{x:CX,y:CY+9,'text-anchor':'middle','dominant-baseline':'middle','font-family':"'DM Sans',sans-serif",'font-size':'7.5','letter-spacing':'2.5',fill:'#9E998F'},gc);
svg.appendChild(gc);

// ── info panel ────────────────────────────────────────────────────────────────
const infoBody=document.getElementById('infoBody');

function famTag(fk){
  const f=FAM[fk];
  return`<div class="info-family-tag" style="background:${f.c[2]};border-color:${f.c[1]};color:${darken(f.c[0])}">
    <span style="width:7px;height:7px;border-radius:50%;background:${f.c[0]};display:inline-block"></span>
    ${f.n} ${f.e}
  </div>`;
}

function showHover(i){
  const s=SEC[i],f=FAM[s.f];
  document.querySelectorAll(`.seg[data-i="${i}"]`).forEach(x=>x.classList.add('hi'));
  infoBody.innerHTML=`
    ${famTag(s.f)}
    <div class="info-sub-name">${s.sub}</div>
    <div class="info-sub-en">${s.sube}</div>
    <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);margin-bottom:8px">代表氣味</div>
    <div class="notes-grid">${s.ns.map(n=>`<span class="note-chip" onclick="searchNote('${n}')">${n}</span>`).join('')}</div>
    <div style="font-size:11px;color:var(--ink-faint);margin-top:14px">點擊氣味可搜尋</div>
  `;
}

function showFamilyHover(fk){
  const f=FAM[fk];
  const subs=SEC.filter(s=>s.f===fk);
  infoBody.innerHTML=`
    ${famTag(fk)}
    ${subs.map(s=>`
      <div style="margin-bottom:12px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--cream)">
        <div style="font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px">${s.sub}</div>
        <div style="font-size:10px;color:var(--ink-faint);margin-bottom:6px">${s.sube}</div>
        <div class="notes-grid">${s.ns.slice(0,4).map(n=>`<span class="note-chip" onclick="searchNote('${n}')">${n}</span>`).join('')}</div>
      </div>`).join('')}
  `;
}

function clearHover(){
  document.querySelectorAll('.seg.hi').forEach(x=>x.classList.remove('hi'));
  infoBody.innerHTML=`<div class="info-placeholder">
    <div class="ph-icon">◎</div>
    <p class="ph-text">移至香調輪探索<br>或輸入氣味搜尋</p>
  </div>`;
}

// ── search ─────────────────────────────────────────────────────────────────────
let searchMode=false;
const searchInput=document.getElementById('searchInput');
const searchClear=document.getElementById('searchClear');
const searchCount=document.getElementById('searchCount');
const allSegs=()=>document.querySelectorAll('.seg[data-i]');

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim();
  searchClear.style.display=q?'block':'none';
  if(q){doSearch(q);}else{endSearch();}
});
searchClear.addEventListener('click',()=>{searchInput.value='';endSearch();searchInput.focus();});

function searchNote(n){
  searchInput.value=n;
  searchClear.style.display='block';
  doSearch(n);
  clearHover();
}

function doSearch(q){
  searchMode=true;
  const ql=q.toLowerCase();
  const hits=SEC.map((s,i)=>{
    const matchedNs=s.ns.filter(n=>n.toLowerCase().includes(ql));
    const subMatch=s.sub.toLowerCase().includes(ql)||s.sube.toLowerCase().includes(ql);
    return{i,s,matchedNs,subMatch,hit:matchedNs.length>0||subMatch};
  });
  const hitSet=new Set(hits.filter(h=>h.hit).map(h=>h.i));

  // fade/highlight segments
  allSegs().forEach(p=>{
    const i=parseInt(p.dataset.i);
    p.classList.remove('hi','faded');
    if(hitSet.has(i))p.classList.add('hi');
    else p.classList.add('faded');
  });
  // ring1 always normal
  document.querySelectorAll('.seg[data-ring="1"]').forEach(p=>p.classList.remove('hi','faded'));

  // count
  searchCount.style.display='block';
  searchCount.textContent=hitSet.size>0?`找到 ${hitSet.size} 個相關香調`:'無相關結果';

  // results panel
  const hitItems=hits.filter(h=>h.hit);
  if(hitItems.length===0){
    infoBody.innerHTML=`<div class="no-results">找不到「${q}」<br><span style="font-size:11px;color:var(--ink-faint)">試試其他關鍵字</span></div>`;
    return;
  }
  infoBody.innerHTML=hitItems.map(({i,s,matchedNs,subMatch})=>{
    const f=FAM[s.f];
    return`<div class="result-item" onmouseenter="highlightSeg(${i})" onmouseleave="resetSearchHighlight()">
      <div class="result-family-tag">
        <div class="result-dot" style="background:${f.c[0]}"></div>${f.n} / ${s.sub}
      </div>
      <div class="result-sub" style="${subMatch?`color:${darken(f.c[0])}`:''}">
        ${subMatch?`<strong>${s.sub}</strong>`:s.sub}
        <span style="font-size:11px;font-weight:400;color:var(--ink-faint);margin-left:4px">${s.sube}</span>
      </div>
      <div class="result-notes">${s.ns.map(n=>`<span class="result-note${matchedNs.includes(n)?' hit':''}">${n}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function highlightSeg(i){
  allSegs().forEach(p=>{
    const pi=parseInt(p.dataset.i);
    p.classList.toggle('hi',pi===i);
    p.classList.toggle('faded',pi!==i);
  });
  document.querySelectorAll('.seg[data-ring="1"]').forEach(p=>p.classList.remove('hi','faded'));
}

function resetSearchHighlight(){
  const q=searchInput.value.trim();
  if(q)doSearch(q);
}

function endSearch(){
  searchMode=false;
  searchClear.style.display='none';
  searchCount.style.display='none';
  allSegs().forEach(p=>p.classList.remove('hi','faded'));
  clearHover();
}

// simple darken for text contrast
function darken(hex){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r*.55);g=Math.round(g*.55);b=Math.round(b*.55);
  return`rgb(${r},${g},${b})`;
}

// ── legend ────────────────────────────────────────────────────────────────────
const legEl=document.getElementById('legendItems');
['fresh','fougere','floral','chypre','oriental','gourmand','woody'].forEach(fk=>{
  const f=FAM[fk];
  const d=document.createElement('div');
  d.className='legend-item';
  d.innerHTML=`<div class="legend-swatch" style="background:linear-gradient(90deg,${f.c[0]},${f.c[2]})"></div>
    <span>${f.n}</span><span class="legend-en">${f.e}</span>`;
  d.addEventListener('click',()=>{if(searchMode)return;showFamilyHover(fk);});
  legEl.appendChild(d);
});
</script>
